<script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
        import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ratios = ['1x1', '16x9', '9x16'];
        const resolutions = { '1x1': {w: 1080, h: 1080}, '16x9': {w: 1920, h: 1080}, '9x16': {w: 1080, h: 1920} };
        let currentVideoURL = '';

        // 縮放網頁上的預覽畫布
        function scalePreviewCanvas() {
            ratios.forEach(r => {
                const wrap = document.getElementById(`wrap${r}`);
                const canvas = document.getElementById(`canvas${r}`);
                if (wrap && canvas) {
                    const scale = wrap.clientWidth / resolutions[r].w;
                    canvas.style.transform = `scale(${scale})`;
                }
            });
        }
        window.addEventListener('resize', scalePreviewCanvas);
        setTimeout(scalePreviewCanvas, 500);

        // 計算高度填滿後的縮放比例與置中位置
        function updatePreview(ratio) {
            const vid = document.getElementById(`vid${ratio}`);
            if (!vid) return;
            const userScale = parseFloat(document.getElementById(`scale${ratio}`).value) || 1;
            const dx = parseFloat(document.getElementById(`x${ratio}`).value) || 0;
            const dy = parseFloat(document.getElementById(`y${ratio}`).value) || 0;
            
            const canvasW = resolutions[ratio].w;
            const canvasH = resolutions[ratio].h;

            const targetVidH = canvasH;
            const targetVidW = targetVidH * (9 / 16);

            const baseLeft = (canvasW - targetVidW) / 2;
            const baseTop = 0; 
            
            vid.style.width = `${targetVidW}px`;
            vid.style.height = `${targetVidH}px`;
            vid.style.left = `${baseLeft}px`;
            vid.style.top = `${baseTop}px`;
            
            vid.style.transform = `translate(${dx}px, ${dy}px) scale(${userScale})`;
        }

        document.querySelectorAll('.param-input').forEach(input => {
            input.addEventListener('input', (e) => updatePreview(e.target.dataset.ratio));
        });

        document.getElementById('inputVideos').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                if(currentVideoURL) URL.revokeObjectURL(currentVideoURL);
                currentVideoURL = URL.createObjectURL(e.target.files[0]);
                ratios.forEach(r => {
                    const vid = document.getElementById(`vid${r}`);
                    if(vid) {
                        vid.src = currentVideoURL;
                        updatePreview(r);
                    }
                });
            }
        });

        document.querySelectorAll('.frame-upload').forEach(input => {
            input.addEventListener('change', function(e) {
                const ratio = this.dataset.ratio;
                if(e.target.files.length > 0) {
                    const frm = document.getElementById(`frm${ratio}`);
                    if(frm) frm.src = URL.createObjectURL(e.target.files[0]);
                }
            });
        });

        // 核心邏輯區
        let ffmpeg = null;
        const logEl = document.getElementById('log');
        
        const log = (msg) => {
            console.log(msg);
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div><span style="color:#888">[${time}]</span> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        };

        async function initFFmpeg() {
            if (ffmpeg) return;
            log("正在初始化 FFmpeg 核心引擎 (v0.12)...");
            ffmpeg = new FFmpeg();
            
            ffmpeg.on('log', ({ message }) => log(`⚙️ ${message}`));
            
            // 定義核心與 Worker 的來源網址
            const coreBaseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
            const ffmpegBaseURL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm';
            
            log("⏳ 正在下載並掛載模組 (避開 GitHub CORS 限制，首次載入請稍候)...");
            
            // 關鍵修正：將 worker.js 也轉換為 Blob URL 來避開 Worker 的跨網域阻擋
            await ffmpeg.load({
                coreURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                classWorkerURL: await toBlobURL(`${ffmpegBaseURL}/worker.js`, 'text/javascript')
            });
            log("✅ FFmpeg 引擎載入完成！準備執行轉檔任務。");
        }

        function getVideoDuration(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = function() {
                    window.URL.revokeObjectURL(video.src);
                    resolve(video.duration);
                }
                video.src = URL.createObjectURL(file);
            });
        }

        document.getElementById('processBtn').addEventListener('click', async () => {
            const btn = document.getElementById('processBtn');
            const videos = document.getElementById('inputVideos').files;
            if (videos.length === 0) return alert('請至少上傳一支影片！');

            btn.disabled = true;
            btn.innerHTML = "⏳ 處理中，請耐心等候...";
            logEl.innerHTML = "<div>系統任務開始...</div>"; 
            
            try {
                await initFFmpeg();
                const zip = new window.JSZip();

                const targetDur = parseFloat(document.getElementById('targetDuration').value);
                const minEndcut = parseFloat(document.getElementById('minEndcutDuration').value);

                const audioFile = document.getElementById('inputAudio').files[0];
                if (audioFile) {
                    await ffmpeg.writeFile('audio.mp3', await fetchFile(audioFile));
                }

                // 將使用者有上傳的圖片寫入虛擬系統
                for (let ratio of ratios) {
                    const frameFile = document.getElementById(`frame${ratio}`).files[0];
                    const endcutFile = document.getElementById(`endcut${ratio}`).files[0];
                    if (frameFile) await ffmpeg.writeFile(`frame_${ratio}.png`, await fetchFile(frameFile));
                    if (endcutFile) await ffmpeg.writeFile(`endcut_${ratio}.png`, await fetchFile(endcutFile));
                }

                let hasProcessedAny = false;

                for (let i = 0; i < videos.length; i++) {
                    const videoFile = videos[i];
                    const originalName = videoFile.name.split('.').slice(0, -1).join('.');
                    const vDuration = await getVideoDuration(videoFile);
                    
                    let endcutDuration = Math.max(minEndcut, targetDur - vDuration);
                    log(`▶ 開始處理第 ${i+1}/${videos.length} 支影片: [${originalName}]`);
                    log(`📊 原片長度: ${vDuration.toFixed(2)}s | 預計 Endcut 長度: ${endcutDuration.toFixed(2)}s`);

                    await ffmpeg.writeFile('input.mp4', await fetchFile(videoFile));

                    for (let ratio of ratios) {
                        const frameFile = document.getElementById(`frame${ratio}`).files[0];
                        const endcutFile = document.getElementById(`endcut${ratio}`).files[0];

                        // 防呆：如果該比例沒上傳完整圖檔，就跳過
                        if (!frameFile || !endcutFile) {
                            log(`⚠️ 略過 [${ratio}] 格式：因未完整上傳對應的 Frame 或 Endcut 圖檔。`);
                            continue;
                        }

                        hasProcessedAny = true;
                        log(`正在運算 [${ratio}] 格式...`);
                        
                        const userScale = document.getElementById(`scale${ratio}`).value;
                        const dx = document.getElementById(`x${ratio}`).value;
                        const dy = document.getElementById(`y${ratio}`).value;
                        const w = resolutions[ratio].w;
                        const h = resolutions[ratio].h;

                        let filterGraph = `
                            [0:v]scale=-1:${h}*${userScale}[v_scaled];
                            color=c=black:s=${w}x${h}:d=${vDuration}[bg];
                            [bg][v_scaled]overlay=(W-w)/2+${dx}:(H-h)/2+${dy}[v_placed];
                            [v_placed][1:v]overlay=0:0[v_framed];
                            [2:v]loop=loop=-1:size=1,setpts=N/FRAME_RATE/TB,trim=duration=${endcutDuration},scale=${w}:${h}[endcut_v];
                            [v_framed][endcut_v]concat=n=2:v=1:a=0[outv]
                        `.replace(/\n/g, '').replace(/\s+/g, '');
                        
                        let maps = ['-map', '[outv]'];
                        if (audioFile) {
                            filterGraph += `;[3:a]adelay=${vDuration*1000}|${vDuration*1000}[delayed_a]`;
                            maps.push('-map', '[delayed_a]');
                        }

                        const outName = `${originalName}_${ratio}.mp4`;
                        
                        try {
                            const ffmpegArgs = [
                                '-i', 'input.mp4',
                                '-i', `frame_${ratio}.png`,
                                '-i', `endcut_${ratio}.png`
                            ];
                            if (audioFile) ffmpegArgs.push('-i', 'audio.mp3');
                            
                            ffmpegArgs.push(
                                '-filter_complex', filterGraph,
                                ...maps,
                                '-c:v', 'libx264',
                                '-pix_fmt', 'yuv420p',
                                '-preset', 'fast' 
                            );
                            if (audioFile) ffmpegArgs.push('-c:a', 'aac', '-shortest');
                            ffmpegArgs.push(outName);

                            await ffmpeg.exec(ffmpegArgs);

                            const outData = await ffmpeg.readFile(outName);
                            zip.file(outName, outData); 
                            log(`✅ 成功生成: ${outName}`);
                        } catch (e) {
                            log(`❌ 失敗: ${outName} 處理過程中發生錯誤。`);
                        }
                    }
                }

                if (hasProcessedAny) {
                    log("🎉 所有影片皆處理完成！正在壓縮打包中...");
                    const zipContent = await zip.generateAsync({ type: "blob" });
                    window.saveAs(zipContent, "Processed_Videos.zip");
                    log("⬇️ ZIP 壓縮檔已觸發下載！");
                } else {
                    log("⚠️ 沒有產出任何影片，因為你沒有上傳任何比例的 Frame 和 Endcut 組合！");
                    alert("請至少完整上傳一種比例（例如 16:9）的 Frame 與 Endcut 圖檔！");
                }

            } catch (err) {
                console.error(err);
                log(`🚨 發生嚴重錯誤: ${err.message}`);
                alert(`程式執行錯誤: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🚀 開始轉檔並下載壓縮檔";
            }
        });
    </script>
